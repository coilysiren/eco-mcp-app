apiVersion: v1
kind: Namespace
metadata:
  name: ${NAME}
---
# GHCR pull-secret, synced declaratively from AWS SSM via the cluster's
# external-secrets operator. `/github/pat` is the shared PAT for ghcr.io/coilysiren
# and lives in AWS SSM Parameter Store (encrypted). ESO renders it into a
# kubernetes.io/dockerconfigjson secret — no manual kubectl create, no PAT
# materializing anywhere outside the cluster.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: docker-registry
  namespace: ${NAME}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-parameter-store
    kind: ClusterSecretStore
  target:
    name: docker-registry
    creationPolicy: Owner
    template:
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: |
          {"auths":{"ghcr.io":{"auth":"{{ printf "coilysiren:%s" .pat | b64enc }}"}}}
  data:
    - secretKey: pat
      remoteRef:
        key: /github/pat
---
# FRED API key for fair_price. SSM param lives in us-east-1, synced
# into a plain Opaque secret and injected as FRED_API_KEY env var so
# the app's env-var path resolves the key (boto3 isn't in the image).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ${NAME}-fred
  namespace: ${NAME}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-parameter-store
    kind: ClusterSecretStore
  target:
    name: ${NAME}-fred
    creationPolicy: Owner
  data:
    - secretKey: FRED_API_KEY
      remoteRef:
        key: /eco-mcp-app/fred-api-key
---
# Eco server APIAdminAuthToken, synced from AWS SSM so the pod can hit the
# admin-only /api/v1/exporter/* routes used by `get_eco_ecoregion` for
# species drift. Without this the drift strip renders its empty state.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: eco-admin-token
  namespace: ${NAME}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-parameter-store
    kind: ClusterSecretStore
  target:
    name: eco-admin-token
    creationPolicy: Owner
  data:
    - secretKey: token
      remoteRef:
        key: /eco-mcp-app/api-admin-token
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ${NAME}-app
  namespace: ${NAME}
  labels:
    app: ${NAME}-app
spec:
  selector:
    matchLabels:
      app: ${NAME}-app
  template:
    metadata:
      labels:
        app: ${NAME}-app
    spec:
      imagePullSecrets:
        - name: docker-registry
      # Resolve eco.coilysiren.me to kai-server's LAN IP from inside the pod.
      # Going out through the public DNS would require hairpin NAT on the
      # home router, which it doesn't support (same limitation that forced
      # cert-manager onto DNS-01 — see kai-server README). Hardcoded IP is
      # fine: single-node k3s, stable home LAN, same IP cert-manager uses.
      hostAliases:
        - ip: "192.168.0.194"
          hostnames:
            - "eco.coilysiren.me"
      containers:
        - name: ${NAME}
          image: ${IMAGE}
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          env:
            - name: PORT
              value: "80"
            - name: FRED_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ${NAME}-fred
                  key: FRED_API_KEY
            - name: ECO_ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: eco-admin-token
                  key: token
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 2
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 30
      restartPolicy: Always

---
apiVersion: v1
kind: Service
metadata:
  name: ${NAME}-service
  namespace: ${NAME}
  annotations:
    tailscale.com/expose: "true"
spec:
  type: ClusterIP
  selector:
    app: ${NAME}-app
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ${NAME}-ingress
  namespace: ${NAME}
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-production
    kubernetes.io/tls-acme: "true"
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - ${DNS_NAME}
      secretName: ${NAME}-tls
  rules:
    - host: ${DNS_NAME}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ${NAME}-service
                port:
                  number: 80
