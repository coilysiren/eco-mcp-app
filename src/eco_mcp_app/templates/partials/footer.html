<div class="footer">
  <div class="footer-meta">

      Fetched {{ fetched_at }}
      {%- if achievements_count %} · {{ achievements_count }} achievements{% endif %}
      {%- if source_url %} · <code>{{ source_url }}</code>{% endif %}

    <div class="footer-actions">
      {% if server.discord %}
        <a class="cta discord" href="{{ server.discord }}" target="_blank" rel="noopener">Join Discord →</a>
      {% endif %}
      <a class="cta steam" href="{{ steam_url }}" target="_blank" rel="noopener">Eco on Steam ↗</a>
    </div>
  </div>
  <div class="credits-line">
    <span>© 2026 <a href="https://www.coilysiren.me/" target="_blank" rel="noopener">Kai Siren</a></span>
    <span class="sep">·</span>
    <a href="https://github.com/coilysiren/eco-mcp-app" target="_blank" rel="noopener">view source on GitHub ↗</a>
  </div>
</div>
