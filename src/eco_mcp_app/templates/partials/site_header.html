<header class="site-header">
  <div class="site-header-inner">
    <a class="site-title" href="https://github.com/coilysiren/eco-mcp-app" target="_blank" rel="noopener">eco-mcp-app</a>
    <nav class="site-nav">
      <a href="/preview">./preview</a>
      <a href="/mcp/">./mcp</a>
      <a href="{{ json_url or '/info' }}">./json</a>
      <a href="https://github.com/coilysiren/eco-mcp-app" target="_blank" rel="noopener">./source</a>
    </nav>
  </div>
</header>
{% if preview_tools %}
<details class="tools-drawer">
  <summary><span class="tools-drawer-caret" aria-hidden="true"></span>tools</summary>
  <nav class="tools-drawer-nav">
    {% for t in preview_tools %}
    <a href="{{ t.href }}"{% if t.current %} aria-current="{{ t.current }}"{% endif %}>{{ t.label }}</a>
    {% endfor %}
  </nav>
</details>
{% endif %}
