<div class="try-others">
  <span class="try-others-label">Try this card on another public Eco server:</span>
  <div class="try-others-pills">
    {% for s in known_servers %}
    <a class="pill"
       {% if loop.first %}href="/preview"{% else %}href="/preview?server={{ s.host }}"{% endif %}
       target="_blank" rel="noopener" title="{{ s.notes }}">{{ s.label }}</a>
    {% endfor %}
  </div>
</div>
