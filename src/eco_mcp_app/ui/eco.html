<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Eco via Sirens</title>
<style>
  :root {
    --bg-0: #06090a;
    --bg-1: #0d1117;
    --bg-2: #14261b;
    --panel: rgba(15, 28, 21, 0.86);
    --panel-border: rgba(124, 179, 66, 0.22);
    --fg: #e8f5e9;
    --fg-muted: #9db5a1;
    --fg-faint: #5e7761;
    --plant: #7cb342;
    --plant-bright: #a5d14a;
    --earth: #8d6e63;
    --meteor-core: #ffd3a3;
    --meteor-hot: #ff6b35;
    --meteor-cool: #c44510;
    --sky: #4fc3f7;
    --warn: #ffb74d;
  }
  /* Claude.ai sandbox iframe reads `documentElement.height` directly and ignores
     ui/notifications/size-changed (claude-ai-mcp#69). It also *snapshots* the
     height early and locks the iframe at that value — any later expansion is
     ignored. So we set a generous fixed height on <html> up front (from JS) and
     DON'T use 100vh (creates a 0-height circular dependency inside the
     sandbox) and DON'T use ResizeObserver (fires pre-render and locks tiny). */
  * { box-sizing: border-box; }
  html { height: 780px; }  /* JS overwrites with measured height after render */
  html, body { margin: 0; padding: 0; background: var(--bg-0); color: var(--fg);
    font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif;
    font-size: 14px; line-height: 1.45; overflow-x: hidden; }
  body { min-height: 780px; position: relative; }

  /* ---- starfield ---- */
  .sky {
    position: absolute; inset: 0; overflow: hidden; z-index: 0;
    background: radial-gradient(ellipse at top right,
      #1a2f1e 0%, var(--bg-1) 40%, var(--bg-0) 100%);
  }
  .star {
    position: absolute; width: 2px; height: 2px; background: #fff;
    border-radius: 50%; opacity: 0.6;
    animation: twinkle var(--d, 3s) ease-in-out infinite;
    animation-delay: var(--delay, 0s);
  }
  .star.big { width: 3px; height: 3px; }
  @keyframes twinkle {
    0%, 100% { opacity: 0.2; transform: scale(0.8); }
    50% { opacity: 1; transform: scale(1.3); }
  }

  /* ---- meteor ---- */
  .meteor-stage {
    position: absolute; top: 0; right: 0; width: 340px; height: 320px;
    pointer-events: none; z-index: 1;
  }
  .meteor {
    position: absolute; top: 28%; right: 20%;
    width: 64px; height: 64px; border-radius: 50%;
    background: radial-gradient(circle at 30% 30%,
      var(--meteor-core) 0%, var(--meteor-hot) 55%, var(--meteor-cool) 100%);
    box-shadow: 0 0 28px rgba(255, 107, 53, 0.7),
                0 0 80px rgba(196, 69, 16, 0.35);
    animation: meteor-float 7s ease-in-out infinite;
  }
  .meteor::before {
    content: ""; position: absolute; top: 22px; left: 40px;
    width: 140px; height: 18px; transform: rotate(22deg);
    background: linear-gradient(90deg,
      rgba(255, 107, 53, 0.8), rgba(255, 107, 53, 0.25) 60%, transparent);
    border-radius: 50% 0 0 50%;
    animation: tail-pulse 2.3s ease-in-out infinite;
  }
  @keyframes meteor-float {
    0%, 100% { transform: translate(0, 0); }
    50% { transform: translate(-10px, 14px); }
  }
  @keyframes tail-pulse {
    0%, 100% { opacity: 0.85; }
    50% { opacity: 0.55; }
  }

  /* ---- shell ---- */
  .shell {
    position: relative; z-index: 2; max-width: 1080px; margin: 0 auto;
    padding: 24px 28px 28px;
  }
  .hdr {
    display: flex; align-items: flex-start; justify-content: space-between;
    gap: 20px; margin-bottom: 20px;
  }
  .title {
    font-size: 22px; font-weight: 800; letter-spacing: -0.01em;
    background: linear-gradient(90deg, var(--plant-bright) 0%, var(--sky) 100%);
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .subtitle { color: var(--fg-muted); font-size: 13px; margin-top: 2px; }
  .status-pill {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 10px; border-radius: 999px; font-size: 11px; font-weight: 600;
    background: rgba(124, 179, 66, 0.15); color: var(--plant-bright);
    border: 1px solid rgba(124, 179, 66, 0.35);
  }
  .status-pill .dot {
    width: 6px; height: 6px; border-radius: 50%; background: var(--plant-bright);
    box-shadow: 0 0 6px var(--plant-bright);
    animation: heartbeat 2s ease-in-out infinite;
  }
  .status-pill.warn { background: rgba(255, 183, 77, 0.15); color: var(--warn);
    border-color: rgba(255, 183, 77, 0.35); }
  .status-pill.warn .dot { background: var(--warn); box-shadow: 0 0 6px var(--warn); }
  @keyframes heartbeat {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.35); opacity: 0.8; }
  }

  /* ---- hero ---- */
  .hero {
    background: var(--panel); border: 1px solid var(--panel-border);
    border-radius: 14px; padding: 22px 24px; margin-bottom: 16px;
    display: grid; grid-template-columns: 1fr auto; gap: 24px; align-items: center;
    backdrop-filter: blur(8px);
  }
  .hero-left .label {
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em;
    color: var(--fg-faint); margin-bottom: 4px;
  }
  .hero-left .big-num {
    font-size: 44px; font-weight: 800; line-height: 1;
    color: var(--meteor-core);
  }
  .hero-left .unit { font-size: 14px; color: var(--fg-muted); margin-left: 8px; }
  .hero-left .note { color: var(--fg-muted); font-size: 12px; margin-top: 6px; }
  .hero-right {
    display: flex; flex-direction: column; align-items: flex-end; gap: 6px;
  }
  .ring {
    --p: 0;
    position: relative; width: 90px; height: 90px; border-radius: 50%;
    background:
      conic-gradient(var(--meteor-hot) calc(var(--p) * 1%),
                     rgba(255, 255, 255, 0.08) 0);
    display: flex; align-items: center; justify-content: center;
    transition: background 0.8s ease;
  }
  .ring::before {
    content: ""; position: absolute; inset: 6px; border-radius: 50%;
    background: var(--bg-1);
  }
  .ring-label {
    position: relative; font-size: 11px; color: var(--fg-muted); text-align: center;
  }
  .ring-label b { display: block; font-size: 22px; color: var(--fg); font-weight: 700; }

  /* ---- stats grid ---- */
  .grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 14px; margin-bottom: 14px;
  }
  .card {
    background: var(--panel); border: 1px solid var(--panel-border);
    border-radius: 12px; padding: 16px 18px; backdrop-filter: blur(6px);
    transition: border-color 180ms ease, transform 180ms ease;
  }
  .card:hover { border-color: rgba(124, 179, 66, 0.5); transform: translateY(-1px); }
  .card .card-label {
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em;
    color: var(--fg-faint);
  }
  .card .card-val {
    font-size: 26px; font-weight: 700; color: var(--fg); margin-top: 4px;
  }
  .card .card-sub { font-size: 12px; color: var(--fg-muted); margin-top: 2px; }
  .card .bar {
    margin-top: 10px; height: 4px; background: rgba(255, 255, 255, 0.06);
    border-radius: 999px; overflow: hidden;
  }
  .card .bar > span {
    display: block; height: 100%; border-radius: 999px;
    background: linear-gradient(90deg, var(--plant) 0%, var(--plant-bright) 100%);
    width: var(--w, 0%); transition: width 0.9s cubic-bezier(.22,.61,.36,1);
  }
  .card.meteor-card .bar > span {
    background: linear-gradient(90deg, var(--meteor-hot), var(--meteor-core));
  }

  /* ---- chips + footer ---- */
  .chips { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 14px; }
  .chip {
    padding: 4px 10px; background: rgba(255, 255, 255, 0.04);
    border: 1px solid rgba(255, 255, 255, 0.08);
    color: var(--fg-muted); border-radius: 999px; font-size: 11px;
  }
  .footer {
    display: flex; align-items: center; justify-content: space-between;
    margin-top: 14px; padding-top: 14px; border-top: 1px solid rgba(255, 255, 255, 0.06);
    font-size: 11px; color: var(--fg-faint);
  }
  .cta {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 14px; background: #5865f2; color: #fff !important;
    border-radius: 8px; text-decoration: none; font-weight: 600; font-size: 12px;
    box-shadow: 0 4px 12px rgba(88, 101, 242, 0.3);
    transition: transform 120ms ease, box-shadow 120ms ease;
  }
  .cta:hover { transform: translateY(-1px); box-shadow: 0 6px 16px rgba(88, 101, 242, 0.45); }
  .empty { padding: 80px 20px; text-align: center; color: var(--fg-muted); }
  .empty .hint { margin-top: 6px; font-size: 12px; color: var(--fg-faint); }
</style>
</head>
<body>
  <div class="sky" id="sky"></div>
  <div class="meteor-stage"><div class="meteor"></div></div>
  <div class="shell" id="root">
    <div class="empty">
      <div style="font-size:28px;font-weight:800;">Eco via Sirens</div>
      <div class="hint">Ask Claude to check the server status.</div>
    </div>
  </div>

<script>
(() => {
  // ---- iframe sizing (claude-ai-mcp#69 workaround) ----
  // Claude.ai reads documentElement.height directly from the iframe DOM and
  // snapshots it early — later expansions do NOT resize the container. So:
  //   1. CSS already sets html/body to a generous fixed 780px
  //   2. After render, temporarily set html height to "max-content", measure
  //      the real content height, then set documentElement.style.height to
  //      max(measured, 780). Mirrors ext-apps SDK's setupSizeChangedNotifications.
  //   3. No ResizeObserver — it fires pre-render and locks the iframe tiny.
  function syncHeight() {
    const de = document.documentElement;
    const prev = de.style.height;
    de.style.height = "max-content";
    const measured = Math.ceil(de.getBoundingClientRect().height);
    const target = Math.max(measured, 780);
    de.style.height = target + "px";
    console.log("[eco-mcp-app] syncHeight — content=" + measured + " final=" + target);
  }

  // ---- starfield ----
  const sky = document.getElementById("sky");
  for (let i = 0; i < 80; i++) {
    const s = document.createElement("div");
    s.className = "star" + (Math.random() > 0.85 ? " big" : "");
    s.style.left = (Math.random() * 100) + "%";
    s.style.top = (Math.random() * 100) + "%";
    s.style.setProperty("--d", (2 + Math.random() * 4) + "s");
    s.style.setProperty("--delay", (Math.random() * 4) + "s");
    sky.appendChild(s);
  }

  // ---- MCP Apps handshake (hand-rolled, no SDK) ----
  // The host (Claude Desktop) only reveals the iframe AFTER we complete:
  //   1. Send ui/initialize (request, id=N), await response
  //   2. Send ui/notifications/initialized (notification, no id)
  // Then it starts pushing ui/notifications/tool-result messages at us.
  // Per claude-ai-mcp#61 — skipping this handshake leaves the iframe hidden.
  const PROTO_VERSION = "2026-01-26";
  let nextId = 1;
  const pending = new Map();

  function send(msg) { window.parent.postMessage(msg, "*"); }
  function request(method, params) {
    const id = nextId++;
    send({ jsonrpc: "2.0", id, method, params });
    return new Promise((resolve, reject) => {
      pending.set(id, { resolve, reject });
    });
  }

  window.addEventListener("message", (evt) => {
    const msg = evt.data;
    if (!msg || msg.jsonrpc !== "2.0") return;
    if (typeof msg.id !== "undefined" && pending.has(msg.id)) {
      const { resolve, reject } = pending.get(msg.id);
      pending.delete(msg.id);
      msg.error ? reject(msg.error) : resolve(msg.result);
      return;
    }
    if (msg.method === "ui/notifications/tool-result") {
      onToolResult(msg.params);
    }
  });

  async function connect() {
    console.log("[eco-mcp-app] sending ui/initialize");
    try {
      // Per @modelcontextprotocol/ext-apps app.js and the 2026-01-26 spec, the
      // params are { appInfo, appCapabilities, protocolVersion } — NOT the
      // { capabilities, protocolVersion } shape from the base MCP initialize.
      // Missing fields cause the host to silently keep the iframe hidden.
      const r = await request("ui/initialize", {
        appInfo: { name: "eco-mcp-app", version: "0.1.0" },
        appCapabilities: {},
        protocolVersion: PROTO_VERSION,
      });
      console.log("[eco-mcp-app] ui/initialize ok:", r);
      send({ jsonrpc: "2.0", method: "ui/notifications/initialized" });
      console.log("[eco-mcp-app] initialized; waiting for ui/notifications/tool-result");
    } catch (e) {
      console.error("[eco-mcp-app] ui/initialize failed:", e);
    }
  }

  // ---- rendering ----
  function extract(result) {
    const blocks = (result && result.content) || [];
    for (const b of blocks) {
      if (b && b.type === "text" && typeof b.text === "string") {
        try {
          const p = JSON.parse(b.text);
          if (p && typeof p === "object" && p.view) return p;
        } catch { /* not our JSON block */ }
      }
    }
    return null;
  }

  function onToolResult(params) {
    const result = params && (params.result || params);
    const p = extract(result);
    if (!p) return;
    render(p);
  }

  function fmt(n) {
    if (n == null) return "—";
    if (n >= 1_000_000) return (n / 1_000_000).toFixed(1) + "M";
    if (n >= 10_000) return (n / 1000).toFixed(0) + "k";
    return n.toLocaleString();
  }

  function render(p) {
    const root = document.getElementById("root");
    if (p.view === "error") {
      root.innerHTML = `<div class="empty"><strong style="color:var(--warn)">Server unreachable</strong>
        <div class="hint">${escape(p.message || "")}</div></div>`;
      return;
    }
    if (p.view !== "eco_status") return;

    const s = p.server, pl = p.players, w = p.world, c = p.cycle, e = p.economy;
    const meteorPct = c.hasMeteor && c.daysUntilMeteor != null
      ? Math.max(0, Math.min(100, 100 - (c.daysUntilMeteor / 60) * 100))
      : 0;
    const playerPct = pl.total > 0 ? (pl.online / pl.total) * 100 : 0;
    const culture = (w.totalCulture || 0).toFixed(1);
    const statusClass = s.paused ? "warn" : "";
    const statusText = s.paused ? "paused" : "online";

    root.innerHTML = `
      <div class="hdr">
        <div>
          <div class="title">Eco via Sirens</div>
          <div class="subtitle">${escape(s.category || "Server")} · day ${c.daysRunning}
            · ${escape(c.collaboration || "")} · ${escape(c.gameSpeed || "")}</div>
        </div>
        <span class="status-pill ${statusClass}"><span class="dot"></span>${statusText}</span>
      </div>

      <div class="hero">
        <div class="hero-left">
          <div class="label">Days until meteor ☄</div>
          <div><span class="big-num">${c.daysUntilMeteor ?? "—"}</span><span class="unit">days</span></div>
          <div class="note">Server running for ${c.daysRunning} days
            ${c.hasMeteor ? `· ${Math.round(meteorPct)}% through the cycle` : ""}</div>
        </div>
        <div class="hero-right">
          <div class="ring" style="--p:${meteorPct.toFixed(1)}">
            <div class="ring-label"><b>${c.daysUntilMeteor ?? "∞"}</b>left</div>
          </div>
        </div>
      </div>

      <div class="grid">
        <div class="card">
          <div class="card-label">Players online</div>
          <div class="card-val">${pl.online} / ${pl.total}</div>
          <div class="card-sub">peak ${pl.peakActive} · ${pl.activeAndOnline} active today</div>
          <div class="bar"><span style="--w:${playerPct.toFixed(1)}%"></span></div>
        </div>
        <div class="card">
          <div class="card-label">World</div>
          <div class="card-val">${escape(w.size || "—")}</div>
          <div class="card-sub">${fmt(w.plants)} plants · ${fmt(w.animals)} animals · ${w.laws} law${w.laws === 1 ? "" : "s"}</div>
        </div>
        <div class="card meteor-card">
          <div class="card-label">Cycle progress</div>
          <div class="card-val">day ${c.daysRunning}</div>
          <div class="card-sub">${c.hasMeteor ? `${c.daysUntilMeteor}d until meteor` : "no meteor"}</div>
          <div class="bar"><span style="--w:${meteorPct.toFixed(1)}%"></span></div>
        </div>
        <div class="card">
          <div class="card-label">Economy &amp; culture</div>
          <div class="card-val">${escape(e.description || "—")}</div>
          <div class="card-sub">${culture} culture points</div>
        </div>
      </div>

      <div class="chips">
        <span class="chip">v ${escape(s.version || "?")}</span>
        <span class="chip">${escape(s.language || "")}</span>
        ${s.hasPassword ? '<span class="chip">password</span>' : '<span class="chip">open</span>'}
        ${s.adminOnline ? '<span class="chip">admin online</span>' : ""}
      </div>

      <div class="footer">
        <span>Fetched ${new Date(p.fetchedAtISO || Date.now()).toLocaleTimeString()}
          · ${p.achievements?.length || 0} server achievements</span>
        ${s.discord ? `<a class="cta" href="${escape(s.discord)}" target="_blank" rel="noopener">Join Discord →</a>` : ""}
      </div>
    `;

    requestAnimationFrame(() => {
      root.querySelectorAll(".bar > span").forEach(el => {
        const w = el.style.getPropertyValue("--w");
        el.style.setProperty("--w", "0%");
        requestAnimationFrame(() => el.style.setProperty("--w", w));
      });
      syncHeight();  // content just changed; re-measure
    });
  }

  function escape(s) {
    return String(s ?? "").replace(/[&<>"']/g,
      c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
  }

  connect();
})();
</script>
</body>
</html>
